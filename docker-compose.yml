services:
  # ── Kafka broker (KRaft modu — Zookeeper'a gerek yok) ─────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    ports:
      - "9092:9092"   # Spring Boot uygulamamız buraya bağlanacak
    environment:
      # KRaft modu ayarları: broker hem "broker" hem "controller" rolünde
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Dinleyiciler (listeners) — ÜÇ kapı:
      #  - EXTERNAL (9092): senin bilgisayarın (host) -> Spring Boot buraya baglanir
      #  - INTERNAL (29092): Docker ag icindeki container'lar -> Kafka UI buraya baglanir
      #  - CONTROLLER (9093): KRaft'in kendi ic haberlesmesi
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      # KRITIK: broker baglananlara hangi adresi "ilan" edecek?
      #  - host'tan gelene  -> localhost:9092
      #  - container'dan gelene -> kafka:29092
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Tek sunucu olduğumuz için kopya (replica) sayıları 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # KRaft cluster için sabit bir kimlik
      CLUSTER_ID: kafka-tedlim-cluster-01
    volumes:
      - kafka-data:/var/lib/kafka/data

  # ── Kafka UI (panoyu tarayıcıdan görmek için) ─────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"   # http://localhost:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: yerel-kafka
      # Kafka UI container icinden baglaniyor -> INTERNAL kapiyi (kafka:29092) kullanir
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      - kafka

volumes:
  kafka-data:
