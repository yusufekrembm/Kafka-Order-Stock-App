spring.application.name=order-app

# Kafka UI 8080'i kullaniyor; uygulamamizi 8081'e aliyoruz (cakismayi onlemek icin)
server.port=8081

# ── Kafka baglantisi ──────────────────────────────────────────────
# Spring Boot bu adresteki Kafka broker'ina baglanacak (docker-compose'daki 9092)
spring.kafka.bootstrap-servers=localhost:9092

# ── Producer (Kafka'ya yazan taraf) ayarlari ──────────────────────
# Mesajin "anahtari" (key) duz metin (String) olacak
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# Mesajin "govdesi" (value) bizim Order nesnemiz -> JSON'a cevrilerek gonderilecek
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ── Consumer (Kafka'dan okuyan taraf) ayarlari ────────────────────
# Consumer group: ayni isi paylasan okuyuculari gruplar (Adim 5'te onemi netlesecek)
spring.kafka.consumer.group-id=stock-service
# Yeni bir consumer ilk basladiginda topic'i EN BASTAN mi okusun?
#  earliest = en eski mesajdan basla | latest = sadece bundan sonra geleni oku
spring.kafka.consumer.auto-offset-reset=earliest
# Gelen mesajin key'i String, value'su ise JSON -> Order nesnesine cevrilecek
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
# Guvenlik: JSON'u hangi paketteki siniflara cevirmeye izin var?
spring.kafka.consumer.properties.spring.json.trusted.packages=com.tedlim.orders.model
# Tip bilgisi gelmezse varsayilan olarak Order nesnesine cevir
spring.kafka.consumer.properties.spring.json.value.default.type=com.tedlim.orders.model.Order

# Kullanacagimiz topic adini tek yerden yonetelim (kendi tanimladigimiz ayar)
app.kafka.orders-topic=orders
